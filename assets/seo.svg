<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%" style="background:#0b0f19; font-family:system-ui, sans-serif;">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    <linearGradient id="lighthouseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="#0b0f19"/>
  <rect width="600" height="400" fill="url(#grid)"/>

  <!-- Main Window -->
  <rect x="50" y="50" width="500" height="300" rx="12" fill="#131b2e" stroke="#1e293b" stroke-width="2"/>
  
  <!-- Header -->
  <path d="M50 80 L550 80" stroke="#1e293b" stroke-width="1.5"/>
  <circle cx="70" cy="65" r="5" fill="#ef4444"/>
  <circle cx="85" cy="65" r="5" fill="#f59e0b"/>
  <circle cx="100" cy="65" r="5" fill="#10b981"/>
  <text x="300" y="68" fill="#64748b" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="1">LIGHTHOUSE AUDIT</text>

  <!-- Left: Lighthouse Circular Score Ring -->
  <rect x="70" y="100" width="210" height="230" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="175" y="125" fill="#ffffff" font-size="12" font-weight="bold" text-anchor="middle">Lighthouse Score</text>

  <circle cx="175" cy="200" r="50" fill="url(#lighthouseGrad)" stroke="#1e293b" stroke-width="8"/>
  <!-- Stroke representing 99 score -->
  <circle cx="175" cy="200" r="50" fill="none" stroke="#10b981" stroke-width="8" stroke-dasharray="314" stroke-dashoffset="3"/>
  <text x="175" y="208" fill="#10b981" font-size="28" font-weight="800" text-anchor="middle">99</text>
  <text x="175" y="270" fill="#ffffff" font-size="11" font-weight="bold" text-anchor="middle">PERFORMANCE</text>
  <text x="175" y="285" fill="#64748b" font-size="9" text-anchor="middle">Speed Index: 0.8s • LCP: 1.1s</text>

  <!-- Right: Core Web Vitals Metrics & Audit List -->
  <rect x="300" y="100" width="230" height="230" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="315" y="125" fill="#ffffff" font-size="12" font-weight="bold">Core Web Vitals</text>

  <!-- LCP -->
  <rect x="315" y="145" width="200" height="40" rx="6" fill="#1e293b"/>
  <text x="330" y="162" fill="#94a3b8" font-size="10" font-weight="bold">Largest Contentful Paint</text>
  <text x="330" y="176" fill="#10b981" font-size="11" font-weight="bold">1.1s (Good)</text>
  <rect x="460" y="153" width="40" height="20" rx="4" fill="#065f46"/>
  <text x="480" y="166" fill="#34d399" font-size="9" font-weight="bold" text-anchor="middle">Pass</text>

  <!-- CLS -->
  <rect x="315" y="195" width="200" height="40" rx="6" fill="#1e293b"/>
  <text x="330" y="212" fill="#94a3b8" font-size="10" font-weight="bold">Cumulative Layout Shift</text>
  <text x="330" y="226" fill="#10b981" font-size="11" font-weight="bold">0.02 (Good)</text>
  <rect x="460" y="203" width="40" height="20" rx="4" fill="#065f46"/>
  <text x="480" y="216" fill="#34d399" font-size="9" font-weight="bold" text-anchor="middle">Pass</text>

  <!-- Optimization Checkmarks -->
  <circle cx="325" cy="265" r="5" fill="#10b981"/>
  <path d="M322 265 L324 267 L328 263" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <text x="340" y="268" fill="#94a3b8" font-size="10">Image compression enabled</text>

  <circle cx="325" cy="285" r="5" fill="#10b981"/>
  <path d="M322 285 L324 287 L328 283" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <text x="340" y="288" fill="#94a3b8" font-size="10">Browser caching leverage active</text>
  
  <circle cx="325" cy="305" r="5" fill="#10b981"/>
  <path d="M322 305 L324 307 L328 303" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <text x="340" y="308" fill="#94a3b8" font-size="10">Preloading critical font styles</text>
</svg>
