<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%" style="background:#0b0f19; font-family:system-ui, sans-serif;">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="#0b0f19"/>
  <rect width="600" height="400" fill="url(#grid)"/>

  <!-- Main Window -->
  <rect x="50" y="50" width="500" height="300" rx="12" fill="#131b2e" stroke="#1e293b" stroke-width="2"/>
  
  <!-- Header -->
  <path d="M50 80 L550 80" stroke="#1e293b" stroke-width="1.5"/>
  <circle cx="70" cy="65" r="5" fill="#ef4444"/>
  <circle cx="85" cy="65" r="5" fill="#f59e0b"/>
  <circle cx="100" cy="65" r="5" fill="#10b981"/>
  <text x="300" y="68" fill="#64748b" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="1">HR ANALYTICS</text>

  <!-- Left: Donut Chart Card -->
  <rect x="70" y="100" width="210" height="230" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="85" y="125" fill="#ffffff" font-size="12" font-weight="bold">Attrition Risk Analysis</text>
  
  <!-- Donut Chart -->
  <circle cx="175" cy="200" r="55" fill="none" stroke="#1e293b" stroke-width="15"/>
  <circle cx="175" cy="200" r="55" fill="none" stroke="#f59e0b" stroke-width="15" stroke-dasharray="345" stroke-dashoffset="100"/>
  <circle cx="175" cy="200" r="55" fill="none" stroke="#ef4444" stroke-width="15" stroke-dasharray="345" stroke-dashoffset="240"/>
  <circle cx="175" cy="200" r="55" fill="none" stroke="#10b981" stroke-width="15" stroke-dasharray="345" stroke-dashoffset="300"/>
  
  <text x="175" y="195" fill="#ffffff" font-size="16" font-weight="bold" text-anchor="middle">30%</text>
  <text x="175" y="210" fill="#64748b" font-size="9" text-anchor="middle">RISK REDUCTION</text>

  <!-- Legend -->
  <circle cx="85" cy="285" r="4" fill="#10b981"/>
  <text x="95" y="288" fill="#94a3b8" font-size="10">Low Risk (70%)</text>
  
  <circle cx="85" cy="305" r="4" fill="#ef4444"/>
  <text x="95" y="308" fill="#94a3b8" font-size="10">High Risk (12%)</text>

  <!-- Right: Funnel Tracking Card -->
  <rect x="300" y="100" width="230" height="230" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="315" y="125" fill="#ffffff" font-size="12" font-weight="bold">Recruitment Funnel</text>

  <!-- Funnel Steps -->
  <!-- Applied -->
  <rect x="330" y="150" width="170" height="25" rx="4" fill="url(#purpleGrad)" opacity="1"/>
  <text x="415" y="166" fill="#ffffff" font-size="10" font-weight="bold" text-anchor="middle">Applied (520)</text>
  
  <!-- Interviewed -->
  <rect x="350" y="185" width="130" height="25" rx="4" fill="url(#purpleGrad)" opacity="0.8"/>
  <text x="415" y="201" fill="#ffffff" font-size="10" font-weight="bold" text-anchor="middle">Interview (142)</text>

  <!-- Selecteded -->
  <rect x="370" y="220" width="90" height="25" rx="4" fill="url(#purpleGrad)" opacity="0.6"/>
  <text x="415" y="236" fill="#ffffff" font-size="10" font-weight="bold" text-anchor="middle">Offered (34)</text>

  <!-- Hired -->
  <rect x="390" y="255" width="50" height="25" rx="4" fill="url(#purpleGrad)" opacity="0.4"/>
  <text x="415" y="271" fill="#ffffff" font-size="10" font-weight="bold" text-anchor="middle">Hired (18)</text>

  <text x="415" y="310" fill="#64748b" font-size="10" text-anchor="middle">Hiring Conversion Rate: 3.4%</text>
</svg>
