<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%" style="background:#0b0f19; font-family:system-ui, sans-serif;">
  <!-- Grid Background -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="#0b0f19"/>
  <rect width="600" height="400" fill="url(#grid)"/>

  <!-- AI Glow -->
  <circle cx="300" cy="200" r="180" fill="url(#glowGrad)"/>

  <!-- Mockup UI Window -->
  <rect x="50" y="50" width="500" height="300" rx="12" fill="#131b2e" stroke="#1e293b" stroke-width="2"/>
  
  <!-- Window Header -->
  <path d="M50 80 L550 80" stroke="#1e293b" stroke-width="1.5"/>
  <circle cx="70" cy="65" r="5" fill="#ef4444"/>
  <circle cx="85" cy="65" r="5" fill="#f59e0b"/>
  <circle cx="100" cy="65" r="5" fill="#10b981"/>
  <text x="300" y="68" fill="#64748b" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="1">OKJOBS.AI</text>

  <!-- Sidebar -->
  <rect x="50" y="80" width="120" height="270" fill="#0f172a" opacity="0.5" rx="0" ry="0"/>
  <path d="M170 80 L170 350" stroke="#1e293b" stroke-width="1.5"/>
  
  <!-- Sidebar Links -->
  <rect x="65" y="105" width="90" height="18" rx="4" fill="#1e293b"/>
  <rect x="65" y="135" width="90" height="8" rx="3" fill="#334155"/>
  <rect x="65" y="155" width="90" height="8" rx="3" fill="#334155"/>
  <rect x="65" y="175" width="90" height="8" rx="3" fill="#334155"/>
  <rect x="65" y="195" width="90" height="8" rx="3" fill="#334155"/>

  <!-- Main Workspace -->
  <!-- Search Bar -->
  <rect x="190" y="105" width="340" height="32" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5"/>
  <text x="210" y="125" fill="#94a3b8" font-size="12">Cloud Engineer | Remote, US</text>
  <rect x="475" y="111" width="45" height="20" rx="4" fill="url(#blueGrad)"/>
  <text x="497" y="124" fill="#ffffff" font-size="10" font-weight="bold" text-anchor="middle">Find</text>

  <!-- Job Card 1 -->
  <rect x="190" y="155" width="340" height="75" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="205" y="178" fill="#ffffff" font-size="13" font-weight="bold">AWS Cloud Architect</text>
  <text x="205" y="195" fill="#64748b" font-size="11">Vercel Inc. • Remote</text>
  <rect x="205" y="205" width="55" height="15" rx="3" fill="#1e293b"/>
  <text x="232" y="216" fill="#3b82f6" font-size="9" font-weight="bold" text-anchor="middle">Python</text>
  <rect x="265" y="205" width="45" height="15" rx="3" fill="#1e293b"/>
  <text x="287" y="216" fill="#3b82f6" font-size="9" font-weight="bold" text-anchor="middle">AWS</text>
  <!-- Match Score Badge -->
  <rect x="460" y="170" width="55" height="20" rx="10" fill="#065f46"/>
  <text x="487" y="183" fill="#34d399" font-size="10" font-weight="bold" text-anchor="middle">98% Match</text>

  <!-- Job Card 2 -->
  <rect x="190" y="245" width="340" height="75" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="205" y="268" fill="#94a3b8" font-size="13" font-weight="bold">Senior Data Analyst</text>
  <text x="205" y="285" fill="#64748b" font-size="11">Stripe • San Francisco, CA</text>
  <rect x="205" y="295" width="45" height="15" rx="3" fill="#1e293b"/>
  <text x="227" y="306" fill="#64748b" font-size="9" font-weight="bold" text-anchor="middle">SQL</text>
  <rect x="255" y="295" width="55" height="15" rx="3" fill="#1e293b"/>
  <text x="282" y="306" fill="#64748b" font-size="9" font-weight="bold" text-anchor="middle">Pandas</text>
  <!-- Match Score Badge -->
  <rect x="460" y="260" width="55" height="20" rx="10" fill="#1f2937"/>
  <text x="487" y="273" fill="#94a3b8" font-size="10" font-weight="bold" text-anchor="middle">92% Match</text>
</svg>
