<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%" style="background:#0b0f19; font-family:system-ui, sans-serif;">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    <linearGradient id="emeraldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="#0b0f19"/>
  <rect width="600" height="400" fill="url(#grid)"/>

  <!-- Main Window -->
  <rect x="50" y="50" width="500" height="300" rx="12" fill="#131b2e" stroke="#1e293b" stroke-width="2"/>
  
  <!-- Header -->
  <path d="M50 80 L550 80" stroke="#1e293b" stroke-width="1.5"/>
  <circle cx="70" cy="65" r="5" fill="#ef4444"/>
  <circle cx="85" cy="65" r="5" fill="#f59e0b"/>
  <circle cx="100" cy="65" r="5" fill="#10b981"/>
  <text x="300" y="68" fill="#64748b" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="1">SALES ANALYTICS</text>

  <!-- Metrics Grid -->
  <!-- Box 1 -->
  <rect x="70" y="100" width="140" height="60" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="85" y="120" fill="#64748b" font-size="10" font-weight="600">TOTAL REVENUE</text>
  <text x="85" y="145" fill="#ffffff" font-size="18" font-weight="bold">$1,245,800</text>
  <text x="175" y="145" fill="#10b981" font-size="10" font-weight="bold">+14.2%</text>

  <!-- Box 2 -->
  <rect x="230" y="100" width="140" height="60" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="245" y="120" fill="#64748b" font-size="10" font-weight="600">CONVERSIONS</text>
  <text x="245" y="145" fill="#ffffff" font-size="18" font-weight="bold">18,420</text>
  <text x="335" y="145" fill="#10b981" font-size="10" font-weight="bold">+8.7%</text>

  <!-- Box 3 -->
  <rect x="390" y="100" width="140" height="60" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="405" y="120" fill="#64748b" font-size="10" font-weight="600">ACTIVE CUSTOMERS</text>
  <text x="405" y="145" fill="#ffffff" font-size="18" font-weight="bold">8,912</text>
  <text x="495" y="145" fill="#ef4444" font-size="10" font-weight="bold">-2.1%</text>

  <!-- Main Chart Card -->
  <rect x="70" y="180" width="460" height="150" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="85" y="205" fill="#ffffff" font-size="12" font-weight="600">Revenue Trend (Q1 - Q4)</text>

  <!-- Grid Lines -->
  <line x1="85" y1="230" x2="515" y2="230" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="85" y1="270" x2="515" y2="270" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="85" y1="310" x2="515" y2="310" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Chart Line -->
  <path d="M 85 300 Q 150 240, 220 280 T 350 210 T 515 220" fill="none" stroke="#10b981" stroke-width="3"/>
  <path d="M 85 300 Q 150 240, 220 280 T 350 210 T 515 220 L 515 310 L 85 310 Z" fill="url(#emeraldGrad)"/>

  <!-- Chart Dots -->
  <circle cx="220" cy="280" r="4" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
  <circle cx="350" cy="210" r="4" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
  <circle cx="515" cy="220" r="4" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
</svg>
